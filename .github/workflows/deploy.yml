name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/cards402

            echo "=== Pulling latest ==="
            git pull origin main

            echo "=== Root workspace (installs web + sdk) ==="
            npm ci

            echo "=== Build SDK ==="
            npm run build -w sdk

            echo "=== Backend (separate package, not a workspace) ==="
            cd backend && npm ci --omit=dev && cd ..

            echo "=== Restarting services ==="
            pm2 describe cards402-api > /dev/null 2>&1 && pm2 restart cards402-api || \
              pm2 start "node src/index.js" --name cards402-api --cwd /opt/cards402/backend

            pm2 describe cards402-web > /dev/null 2>&1 && pm2 restart cards402-web || \
              pm2 start "npx next dev -p 3100" --name cards402-web --cwd /opt/cards402/web

            pm2 save
            echo "=== Deploy complete ==="
