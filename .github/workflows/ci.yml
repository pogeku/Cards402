name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Backend JS type check (opt-in files with @ts-check)
        working-directory: backend
        run: npm run typecheck

  api-contract:
    name: Validate OpenAPI contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate OpenAPI specs parse correctly
        run: npm run api:validate
      - name: Regenerate types and check for drift
        run: |
          npm run api:generate
          git diff --exit-code contract/api/*.d.ts || {
            echo "::error::Generated types are out of date. Run 'npm run api:generate' and commit."
            exit 1
          }

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --if-present
        env:
          NODE_ENV: test
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Blocks on moderate+ (was: high) to catch more vulns before they reach prod
      - run: npm audit --audit-level=moderate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build SDK
        run: npm run build -w sdk
      - name: Build Web
        run: npm run build -w web
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.cards402.com

  backend-smoke:
    name: Backend syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check all backend JS syntax
        # Globs every .js under backend/src — no file needs to be manually added here
        run: find backend/src -name '*.js' -print0 | xargs -0 node --check

  contract-build:
    name: Contract build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract
      - name: Test contract (native target)
        working-directory: contract
        run: cargo test
      - name: Build contract (WASM)
        working-directory: contract
        run: cargo build --target wasm32-unknown-unknown --release

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: web
        run: npx playwright test
        env:
          CI: true

  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD --verbose

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        # p/security-audit catches injection, path traversal, eval, etc.
        # p/javascript catches Node.js-specific issues
        # p/owasp-top-ten maps to OWASP categories
        # --error exits non-zero if any findings — blocks the PR
        run: semgrep --config p/security-audit --config p/javascript --config p/owasp-top-ten --error .

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      [lint, typecheck, test, audit, build, backend-smoke, contract-build, e2e, secret-scan, sast]
    if: always()
    steps:
      - name: Discord notification
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CI }}
          STATUS: ${{ contains(needs.*.result, 'failure') && '❌ Failed' || '✅ Passed' }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"cards402 CI — $STATUS\",\"description\":\"Branch: \`$REF\` · Actor: $ACTOR\",\"url\":\"$RUN_URL\",\"color\":$([ \"$STATUS\" = \"✅ Passed\" ] && echo 3066993 || echo 15158332)}]}"
